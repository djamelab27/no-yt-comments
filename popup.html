<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NoYTComments</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="card">
    <h1>Hide YouTube Comments</h1>

    <label class="switch-row">
      <span id="statusText">ON</span>
      <input type="checkbox" id="toggle" />
      <span class="switch"></span>
    </label>

    <p>Reload YouTube to apply changes.</p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
